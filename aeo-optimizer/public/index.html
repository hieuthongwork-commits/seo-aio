<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEO & GEO Content Optimizer</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --accent: #38bdf8;
            --border: #334155;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
        }
        h1 {
            text-align: center;
            color: var(--accent);
        }
        .card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-color);
            color: var(--text-main);
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 1rem;
            background-color: var(--accent);
            color: #0f172a;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover {
            opacity: 0.9;
        }
        .results {
            display: none;
        }
        .score-circle {
            font-size: 2rem;
            font-weight: bold;
            color: #4ade80;
        }
        pre {
            background: var(--bg-color);
            padding: 1rem;
            border-radius: 6px;
            overflow-x: auto;
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>AEO & GEO Content Optimizer</h1>
    
    <div class="card">
        <label for="keyword">Target Keyword / Entity:</label>
        <input type="text" id="keyword" placeholder="Nhập từ khóa trọng tâm (VD: Generative AI)">

        <label for="content">Nội dung bài viết:</label>
        <textarea id="content" rows="6" placeholder="Nhập đoạn văn bản cần tối ưu..."></textarea>

        <button onclick="analyzeContent()">Phân tích định dạng AEO</button>
    </div>

    <div class="card results" id="result-card">
        <h2>Kết quả phân tích</h2>
        <p><strong>AEO Readiness Score:</strong> <span class="score-circle" id="score">0</span>/100</p>
        <p><strong>Entities nhận diện:</strong> <span id="entities"></span></p>
        
        <h3>FAQ Schema (Tự động tạo)</h3>
        <p><small>Việc chèn JSON-LD này giúp LLM dễ dàng trích xuất thông tin dưới dạng Hỏi-Đáp.</small></p>
        <pre><code id="schema"></code></pre>
    </div>
</div>

<script>
    function analyzeContent() {
        const keyword = document.getElementById('keyword').value;
        const text = document.getElementById('content').value;

        if (!text) {
            alert('Vui lòng nhập nội dung!');
            return;
        }

        const wordCount = text.trim().split(/\s+/).length;
        let aeoScore = 50;

        if (wordCount > 50) {
            aeoScore += 20;
        }
        if (keyword && text.toLowerCase().includes(keyword.toLowerCase())) {
            aeoScore += 30;
        }

        const entities = [keyword, "Công nghệ sấy đông khô (Freeze-Dried)", "Nông sản hữu cơ", "USDA Organic"];

        const schema = `{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [{
    "@type": "Question",
    "name": "Sản phẩm \${keyword || 'Vinamit'} có ưu điểm gì nổi bật?",
    "acceptedAnswer": {
      "@type": "Answer",
      "text": "\${text.substring(0, 150)}... Áp dụng tiêu chuẩn công nghệ cao giữ trọn dinh dưỡng tự nhiên."
    }
  }]
}`;

        document.getElementById('score').innerText = aeoScore;
        document.getElementById('entities').innerText = entities.filter(Boolean).join(', ');
        document.getElementById('schema').innerText = schema;
        
        document.getElementById('result-card').style.display = 'block';
    }
</script>

</body>
</html>
