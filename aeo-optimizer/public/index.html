<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEO & GEO Content Optimizer (Pro Version)</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --accent: #38bdf8;
            --border: #334155;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
        }
        h1 {
            text-align: center;
            color: var(--accent);
        }
        .card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-color);
            color: var(--text-main);
            box-sizing: border-box;
            font-family: inherit;
        }
        button {
            width: 100%;
            padding: 1rem;
            background-color: var(--accent);
            color: #0f172a;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover {
            opacity: 0.9;
        }
        .results {
            display: none;
        }
        .score-circle {
            font-size: 2rem;
            font-weight: bold;
            color: #4ade80;
        }
        pre {
            background: var(--bg-color);
            padding: 1rem;
            border-radius: 6px;
            overflow-x: auto;
            border: 1px solid var(--border);
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .badge {
            display: inline-block;
            background: var(--accent);
            color: #0f172a;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            margin-right: 5px;
            margin-bottom: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>AEO Entity & Schema Engine</h1>
    
    <div class="card">
        <label for="keyword">Target Entity (Từ khóa chính):</label>
        <input type="text" id="keyword" placeholder="VD: Sấy đông khô, Generative AI, Sầu riêng Ri6...">

        <label for="content">Nội dung bài viết (Content Payload):</label>
        <textarea id="content" rows="6" placeholder="Paste đoạn văn bản cần audit vào đây..."></textarea>

        <button onclick="analyzeContent()">Audit & Extract AEO Data</button>
    </div>

    <div class="card results" id="result-card">
        <h2>Báo cáo Phân tích</h2>
        <p><strong>AEO Readiness Score:</strong> <span class="score-circle" id="score">0</span>/100</p>
        
        <p><strong>Thực thể (Entities) được AI bắt tự động:</strong></p>
        <div id="entities" style="margin-bottom: 1.5rem;"></div>
        
        <h3>JSON-LD FAQ Schema (Sẵn sàng Inject)</h3>
        <p><small>Cấu trúc Hỏi-Đáp được sinh tự động dựa trên Context của đoạn văn nhằm nuôi AI Bots.</small></p>
        <pre><code id="schema"></code></pre>
    </div>
</div>

<script>
    function analyzeContent() {
        const keyword = document.getElementById('keyword').value.trim();
        const text = document.getElementById('content').value.trim();

        if (!text) {
            alert('Vui lòng nhập nội dung cần phân tích!');
            return;
        }

        // 1. Tính toán điểm số thông minh (Smart Scoring)
        const wordCount = text.split(/\s+/).length;
        let aeoScore = 40; 
        
        if (wordCount > 40) aeoScore += 15;
        if (wordCount > 80) aeoScore += 15;

        if (keyword !== '') {
            const keywordRegex = new RegExp(keyword, 'gi');
            const matchCount = (text.match(keywordRegex) || []).length;
            if (matchCount > 0) aeoScore += 20;
            if (matchCount > 1) aeoScore += 10; // Điểm thưởng mật độ từ khóa
        }
        
        aeoScore = Math.min(aeoScore, 100);

        // 2. Trích xuất Thực thể Động (Dynamic Entity Extraction)
        let entitiesSet = new Set();
        if (keyword) entitiesSet.add(keyword);

        // Thuật toán quét danh từ riêng/cụm từ viết hoa (Giả lập NER - Named Entity Recognition)
        const properNounRegex = /([A-ZĐ][\wÀ-ỹ]+(?:\s+[A-ZĐ][\wÀ-ỹ]+)*)/g;
        const capsMatches = text.match(properNounRegex);
        
        if (capsMatches) {
            capsMatches.forEach(match => {
                if (match.length > 3 && match.toLowerCase() !== keyword.toLowerCase()) {
                    entitiesSet.add(match);
                }
            });
        }

        const entityArray = Array.from(entitiesSet).slice(0, 6); // Lấy tối đa 6 entities
        
        // Render Entities dạng nhãn (Badge) cho chuyên nghiệp
        const entitiesHtml = entityArray.map(e => `<span class="badge">${e}</span>`).join('');

        // 3. Tạo Schema Động (Dynamic Context Schema)
        // Lấy câu đầu tiên làm Direct Answer cho AI
        let firstSentence = text.split(/(?:\. |\n)/)[0].trim();
        if (!firstSentence.endsWith('.')) firstSentence += '.';
        if (firstSentence.length > 180) firstSentence = firstSentence.substring(0, 180) + "...";

        const schemaQuestion = keyword ? `Khái niệm và đặc điểm của ${keyword} là gì?` : "Thông tin cốt lõi của đoạn nội dung này là gì?";

        const schema = `{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [{
    "@type": "Question",
    "name": "${schemaQuestion}",
    "acceptedAnswer": {
      "@type": "Answer",
      "text": "${firstSentence}"
    }
  }]
}`;

        // 4. Bắn dữ liệu ra màn hình
        document.getElementById('score').innerText = aeoScore;
        document.getElementById('entities').innerHTML = entitiesHtml || '<span class="badge" style="background:#64748b;">Chưa nhận diện được thực thể rõ ràng</span>';
        document.getElementById('schema').innerText = schema;
        
        document.getElementById('result-card').style.display = 'block';
    }
</script>

</body>
</html>
